<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satma Industries - Site en construction</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat', sans-serif;
    background:#ffffff;
    color:#222;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    max-width:900px;
    width:90%;
    text-align:center;
}

.logo{
    margin-bottom:60px;
}

.logo img{
    max-width:700px;
    width:100%;
    height:auto;
}

h1{
    font-size:3rem;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:25px;
    color:#2d2d2d;
}

.subtitle{
    font-size:1.15rem;
    color:#666;
    line-height:1.8;
    max-width:700px;
    margin:auto;
}

.separator{
    width:120px;
    height:4px;
    background:#44b649;
    margin:40px auto;
    border-radius:10px;
}

.footer{
    margin-top:70px;
    color:#999;
    font-size:0.9rem;
    letter-spacing:1px;
}

@media(max-width:768px){

    h1{
        font-size:2rem;
    }

    .subtitle{
        font-size:1rem;
    }

    .logo{
        margin-bottom:40px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">
        <img src="logo_satma-industries.jpg" alt="Satma Industries">
    </div>

    <h1>Notre site arrive bientôt</h1>

    <div class="separator"></div>

    <p class="subtitle">
        Satma Industries prépare actuellement une nouvelle expérience digitale.<br><br>
        Nous travaillons à la mise en ligne de notre nouveau site afin de vous présenter
        nos activités, nos expertises et nos solutions industrielles.
    </p>

    <div class="footer">
        © 2026 SATMA INDUSTRIES
    </div>

</div>

</body>
</html>
